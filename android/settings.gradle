pluginManagement {
  def projectRootDir = rootDir.getParentFile()
  def reactNativeGradlePluginDir = new File(projectRootDir, "node_modules/@react-native/gradle-plugin")
  def expoAutolinkingPluginDir = new File(projectRootDir, "node_modules/expo-modules-autolinking/android/expo-gradle-plugin")

  if (!reactNativeGradlePluginDir.exists()) {
    throw new GradleException("No se encontro node_modules/@react-native/gradle-plugin. Ejecuta npm install en la raiz del proyecto.")
  }
  if (!expoAutolinkingPluginDir.exists()) {
    throw new GradleException("No se encontro node_modules/expo-modules-autolinking/android/expo-gradle-plugin. Ejecuta npm install en la raiz del proyecto.")
  }

  includeBuild(reactNativeGradlePluginDir.absolutePath)
  includeBuild(expoAutolinkingPluginDir.absolutePath)
}

plugins {
  id("com.facebook.react.settings")
  id("expo-autolinking-settings")
}

extensions.configure(com.facebook.react.ReactSettingsExtension) { ex ->
  if (System.getenv('EXPO_USE_COMMUNITY_AUTOLINKING') == '1') {
    ex.autolinkLibrariesFromCommand()
  } else {
    ex.autolinkLibrariesFromCommand(expoAutolinking.rnConfigCommand)
  }
}
expoAutolinking.useExpoModules()

rootProject.name = 'Family Health Tracker IA'

expoAutolinking.useExpoVersionCatalog()

include ':app'
includeBuild(expoAutolinking.reactNativeGradlePlugin)
